<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toby Reid</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f5;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        width: auto;
      }

      img {
        width: 162px;
        height: 162px;
        border-radius: 50%;
        object-fit: cover;
      }

      .info {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        font-size: 2.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
      }

      .fields {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field {
        display: flex;
        font-size: 0.875rem;
        gap: 0;
      }

      .label {
        width: 72px;
        flex-shrink: 0;
        color: #888;
      }

      a {
        color: #7b1d2e;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      @media (min-width: 640px) {
        main {
          flex-direction: row;
          align-items: center;
        }

        img {
          flex-shrink: 0;
        }

        .info {
          align-items: flex-start;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #120609;
          color: #faf7f5;
        }

        .label {
          color: #666;
        }

        a {
          color: #c45c70;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="Toby Reid.jpg" alt="Toby Reid" />
      <div class="info">
        <h1>Toby Reid</h1>
        <div class="fields">
          <div class="field">
            <span class="label">Email</span>
            <a href="mailto:contact@tobyreid.dev">contact@tobyreid.dev</a>
          </div>
          <div class="field">
            <span class="label">GitHub</span>
            <a href="https://github.com/tobyreiddev">github.com/tobyreiddev</a>
          </div>
          <div class="field">
            <span class="label">LinkedIn</span>
            <a href="https://linkedin.com/in/toby-reid-dev"
              >linkedin.com/in/toby-reid-dev</a
            >
          </div>
          <div class="field">
            <span class="label">Website</span>
            <a href="https://tobyreid.dev">tobyreid.dev</a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
